#
#
########## Flow logs  ##################################################

  FlowLogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: VPC-TGW-FlowLogPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: "*"
  TGWFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "TGW-Flowlog"
      RetentionInDays: 30

  IngressVPCFlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "IngressVPC-Flowlog"
      RetentionInDays: 30

  EgressVPCFlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "EgressVPC-Flowlog"
      RetentionInDays: 30

  VPC1FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC1-Flowlog"
      RetentionInDays: 30

  VPC2FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC2-Flowlog"
      RetentionInDays: 30

  InspectionVPCFlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "InspectionVPC-Flowlog"
      RetentionInDays: 30

  TGWFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceType: TransitGateway
      ResourceId: !Ref TransitGateway
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref TGWFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt  FlowLogIAMRole.Arn
      Tags:
        - Key: Name
          Value: TGW-Flowlog

  IngressVPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref IngressVPCFlowLogLogGroup
      ResourceId: !Ref IngressVPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: IngressVPC-Flowlog

  EgressVPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref EgressVPCFlowLogLogGroup
      ResourceId: !Ref EgressVPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: EgressVPC-Flowlog

  VPC1FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC1FlowLogLogGroup
      ResourceId: !Ref VPC1
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: VPC1-Flowlog

  VPC2FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC2FlowLogLogGroup
      ResourceId: !Ref VPC2
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: VPC2-Flowlog

  InspectionVPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref InspectionVPCFlowLogLogGroup
      ResourceId: !Ref InspectionVPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: InspectionVPC-Flowlog
########## Flow logs End here ##########################################
#
#
#
#
########## EC2 Resources ###################################################
  VPCKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: IngressVPC-KeyPair
      KeyType: rsa
      Tags:
        - Key: Name
          Value: VPC-KeyPair

  IngressVPCSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from Internet
      VpcId: !Ref IngressVPC
      GroupName: IngressVPC-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: IngressVPC-SG

  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-SSMRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  EC2SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: "EC2-SSMInstanceProfile"
      Roles:
        - !Ref EC2SSMRole

  IngressVPCEC2InstanceBastionHost:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref InstanceImageId
      InstanceType: t3.micro
      SubnetId: !Ref IngressVPCPublicSubnet1
      KeyName: !Ref VPCKeyPair
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      SecurityGroupIds:
        - !Ref IngressVPCSecurityGroup
      Tags:
        - Key: Name
          Value: IngressVPC-Instance-BastionHost
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 10
            VolumeType: gp3

  VPC1WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from Internet
      VpcId: !Ref VPC1
      GroupName: VPC1-Web-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref VPC1Cidr
      Tags:
        - Key: Name
          Value: VPC1-Web-SG

  VPC1EC2InstanceWeb1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref InstanceImageId
      InstanceType: t3.micro
      SubnetId: !Ref VPC1PrivateSubnet1
      KeyName: !Ref VPCKeyPair
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      SecurityGroupIds:
        - !Ref VPC1WebSecurityGroup
      Tags:
        - Key: Name
          Value: VPC1-Web1
        - Key: AddToALB
          Value: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "<h1>VPC1 Web Server 1 - Apache is running</h1>" > /var/www/html/index.html

  VPC1EC2InstanceWeb2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref InstanceImageId
      InstanceType: t3.micro
      SubnetId: !Ref VPC1PrivateSubnet2
      KeyName: !Ref VPCKeyPair
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      SecurityGroupIds:
        - !Ref VPC1WebSecurityGroup
      Tags:
        - Key: Name
          Value: VPC1-Web2
        - Key: AddToALB
          Value: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "<h1>VPC1 Web Server 2 - Apache is running</h1>" > /var/www/html/index.html
########## EC2 Resources Ends here###################################################
#
#
#
#
########## NW Firewall Resources ###################################################

  NwFirewall:
    Type: AWS::NetworkFirewall::Firewall
    Properties:
      DeleteProtection: false
      SubnetChangeProtection: true
      FirewallName: NwFireWall
      FirewallPolicyArn: !Ref NwFirewallPolicyStrict
      VpcId: !Ref InspectionVPC
      SubnetMappings:
        - SubnetId: !Ref InspectionVPCFirewallSubnet1
        - SubnetId: !Ref InspectionVPCFirewallSubnet2
      Description: Network Firewall in the Inspection VPC.
      Tags:
        - Key: Name
          Value: NwFireWall

  FirewallLoggingConfiguration:
    Type: AWS::NetworkFirewall::LoggingConfiguration
    DependsOn:
      - AlertLogGroup
      - FlowLogGroup
    Properties:
      FirewallArn: !Ref NwFirewall
      LoggingConfiguration:
        LogDestinationConfigs:
          - LogType: ALERT
            LogDestinationType: CloudWatchLogs
            LogDestination:
              logGroup: NetworkFirewallAlertLogs
          - LogType: FLOW
            LogDestinationType: CloudWatchLogs
            LogDestination:
              logGroup: NetworkFirewallFlowLogs

  AlertLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:  NetworkFirewallAlertLogs
      RetentionInDays: 90
      Tags:
        - Key: Name
          Value: NetworkFirewallAlertLogs

  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: NetworkFirewallFlowLogs
      RetentionInDays: 90
      Tags:
        - Key: Name
          Value: NetworkFirewallFlowLogs

  NwFirewallPolicyStrict:
    Type: AWS::NetworkFirewall::FirewallPolicy
    Properties:
      FirewallPolicyName: NwFirewall-StrictOrder-Policy
      FirewallPolicy:
        StatelessDefaultActions:
          - aws:forward_to_sfe
        StatelessFragmentDefaultActions:
          - aws:forward_to_sfe
        StatefulDefaultActions:
          - aws:drop_strict
          - aws:alert_strict
        StatefulRuleGroupReferences:
          - ResourceArn: !Ref StatefulRuleGroupStrict1
            Priority: 100
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/MalwareDomainsStrictOrder
            Priority: 102
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesWebAttacksStrictOrder
            Priority: 103
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesMalwareWebStrictOrder
            Priority: 104
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesPhishingStrictOrder
            Priority: 105
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesBotnetStrictOrder
            Priority: 106
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesMalwareStrictOrder
            Priority: 107
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesBotnetWebStrictOrder
            Priority: 108
          - ResourceArn: !Sub arn:aws:network-firewall:${AWS::Region}:aws-managed:stateful-rulegroup/ThreatSignaturesDoSStrictOrder
            Priority: 109
        StatelessRuleGroupReferences:
          - ResourceArn: !Ref StatelessRuleGroup1
            Priority: 100
        StatefulEngineOptions:
          RuleOrder: STRICT_ORDER
          StreamExceptionPolicy: CONTINUE
          FlowTimeouts:
            TcpIdleTimeoutSeconds: 3600
      Tags:
        - Key: Name
          Value: NwFirewall-StrictOrder-Policy

  StatefulRuleGroupStrict1:
    Type: AWS::NetworkFirewall::RuleGroup
    Properties:
      RuleGroupName: Stateful-StrictOrder-1
      Type: STATEFUL
      RuleGroup:
        RuleVariables:
          IPSets:
            HOME_NET:
              Definition:
                - 10.10.0.0/24
                - 10.20.0.0/24
                - 10.30.0.0/24
                - 10.40.0.0/24
                - 10.50.0.0/24
          PortSets:
            Web_HTTP_TCP:
              Definition:
                - '80'
                - '443'
        RulesSource:
          RulesString: |
            ####### SECTION:1 InterVPC Communication. All ports are enabled.##########
            ## SECTION:1.1 All TCP Communications enabled -----------------
            alert tcp $HOME_NET any -> $HOME_NET any (msg:"Allow all internal TCP traffic"; sid:100001; rev:1;)
            pass tcp $HOME_NET any -> $HOME_NET any (msg:"Allow all internal TCP traffic"; sid:100002; rev:1;)
            ## SECTION:1.2 All UDP Communications enabled.
            alert udp $HOME_NET any -> $HOME_NET any (msg:"Alert to allow all internal UDP traffic"; sid:100003; rev:1;)
            pass udp $HOME_NET any -> $HOME_NET any (msg:"Allow all internal UDP traffic"; sid:100004; rev:1;)
            #######
            ####### SECTION: 2 Services within AWS those need access from external network ##########
            ## SECTION: 2.1 web Services -------------------
            alert tcp any any -> $HOME_NET $Web_HTTP_TCP (msg:"Alert to allow TCP HTTP/HTTPS"; sid:200001; rev:1;)
            pass tcp any any -> $HOME_NET $Web_HTTP_TCP (msg:"Allow TCP 443 (HTTPS) for OpenVPN"; sid:200002; rev:1;)
            alert udp any any -> $HOME_NET $Web_HTTP_TCP (msg:"Alert to allow UDP 1194 for OpenVPN"; sid:200003; rev:1;)
            pass udp any any -> $HOME_NET $Web_HTTP_TCP (msg:"Allow UDP 1194 for OpenVPN"; sid:200004; rev:1;)
            ####### SECTION: 3 Internet Inbound traffic ##########
            ## SECTION: 3.1 To specific Domains in AWS -----------------------------
            alert http any any -> $HOME_NET any (http.host; dotprefix; content:".amazonaws.com";endswith; msg:"Alert to allow HTTP access to the servers ending with amazonaws.com"; sid:30001; rev:1;)
            pass http any any -> $HOME_NET any (http.host; dotprefix; content:".amazonaws.com";endswith; msg:"Allow HTTP access to the servers ending with amazonaws.com"; sid:30002; rev:1;)
            alert tls any any -> $HOME_NET any (tls.sni; dotprefix; content:".amazonaws.com";  endswith; msg:"Alert to allow HTTPS access to the servers ending with amazonaws.com"; sid:30003; rev:1;)
            pass tls any any -> $HOME_NET any (tls.sni; dotprefix; content:".amazonaws.com";  endswith; msg:"Allow HTTPS access to the servers ending with amazonaws.com"; sid:30004; rev:1;)
            alert tcp any any ->  $HOME_NET 80 (msg:"To allow lower layer tcp port 80 for http"; sid:30005; rev:1;)
            pass tcp any any ->  $HOME_NET 80 (msg:"To allow lower layer tcp port 80 for http"; sid:30006; rev:1;)
            ####### SECTION: 4 Internet Outbound traffic ##########
            ## SECTION: 4.1 To enable all the sites in internet ----------
            alert http $HOME_NET any -> any any (msg:"Permit all internet sites access by HTTP"; sid:40001; rev:1;)
            pass http $HOME_NET any -> any any (msg:"Permit all internet sites access by HTTP"; sid:40002; rev:1;)
            alert tls $HOME_NET any -> any any (msg:"Permit all internet sites access by HTTPS"; sid:40003; rev:1;)
            pass tls $HOME_NET any -> any any (msg:"Permit all internet sites access by HTTPS"; sid:40004; rev:1;)
            ## SECTION: 4.2 Allowed port 80 from AWS to internet ------------------
            alert tcp $HOME_NET any <> any 80 (flow:not_established; msg:"Alert to allow lower layer tcp port 80 for http"; sid:40005; rev:1;)
            pass tcp $HOME_NET any <> any 80 (flow:not_established; msg:"To allow lower layer tcp port 80 for http"; sid:40006; rev:1;)
            ## SECTION: 4.3 Allowed port 443 from AWS to internet --------------------
            alert tcp any any <> any 443 (flow:not_established; msg:"Alert to allow lower layer tcp port 443 for https"; sid:40007; rev:1;)
            pass tcp any any <> any 443 (flow:not_established; msg:"Allow lower layer tcp port 443 for https"; sid:40008; rev:1;)
            ##
        StatefulRuleOptions:
          RuleOrder: STRICT_ORDER # Can be 'STRICT' or 'DEFAULT'
      Capacity: 1000
      Tags:
        - Key: Name
          Value: Stateful-StrictOrder-1

  StatelessRuleGroup1:
    Type: AWS::NetworkFirewall::RuleGroup
    Properties:
      RuleGroupName: Stateless1
      Type: STATELESS
      RuleGroup:
        RulesSource:
          StatelessRulesAndCustomActions:
            StatelessRules:
              - RuleDefinition:
                  MatchAttributes:
                    Sources:
                      - AddressDefinition: 0.0.0.0/0
                    Destinations:
                      - AddressDefinition: 0.0.0.0/0
                    Protocols:
                      - '1'
                  Actions:
                    - aws:pass
                Priority: 10
              - RuleDefinition:
                  MatchAttributes:
                    Sources:
                      - AddressDefinition: 0.0.0.0/0
                    Destinations:
                      - AddressDefinition: 0.0.0.0/0
                  Actions:
                    - aws:forward_to_sfe
                Priority: 20
      Capacity: 1000
      Description: Stateless Rule Group
      Tags:
        - Key: Name
          Value: Stateless1

