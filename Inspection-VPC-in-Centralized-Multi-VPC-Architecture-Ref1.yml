    DependsOn: EgressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCPublicRouteTable
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  EgressVPCPubRTDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: EgressVPCIGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref EgressVPCIGW

  EgressVPCTgw1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EgressVPCTgwSubnet1
      RouteTableId: !Ref EgressVPCTgwRouteTable1

  EgressVPCTgw2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EgressVPCTgwSubnet2
      RouteTableId: !Ref EgressVPCTgwRouteTable2

  EgressVPCPubRTAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
