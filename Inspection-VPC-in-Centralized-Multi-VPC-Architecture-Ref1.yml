AWSTemplateFormatVersion: '2010-09-09'
Description: >
  [Centralized inspection VPC using a Transit Gateway for North-South and East-West traffic inspection.]
  [Documentation: Refer the output section for documentation.]
  [Author: Rajesh Raveendran]
  [Version: 1.0.0]
  [Date: 04-08-2025]

Parameters:
  IngressVPCCidr:
    Type: String
    Description: CIDR block for VPC 1
    Default: 10.10.0.0/24
  EgressVPCCidr:
    Type: String
    Description: CIDR block for VPC 2
    Default: 10.20.0.0/24
  VPC1Cidr:
    Type: String
    Description: CIDR block for VPC 3
    Default: 10.30.0.0/24
  VPC2Cidr:
    Type: String
    Description: CIDR block for VPC 4
    Default: 10.40.0.0/24
  InspectionVPCCidr:
    Type: String
    Description: CIDR block for VPC 4
    Default: 10.50.0.0/24
  Az1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone
  Az2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone
  InstanceImageId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for EC2 instance
    Default: ami-093dc6859d9315726

Resources:
########## IngressVPC Resources ###################################################

  IngressVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref IngressVPCCidr
      Tags:
        - Key: Name
          Value: IngressVPC
  IngressVPCIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: IngressVPC-IGW
  IngressVPCIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref IngressVPC
      InternetGatewayId: !Ref IngressVPCIGW

  IngressVPCTgwSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IngressVPC
      CidrBlock: !Select [0, !Cidr [!Ref IngressVPCCidr, 2, 4]] # 2 subnets of /28 out of that the first one will be used
      AvailabilityZone: !Ref Az1
      Tags:
        - Key: Name
          Value: IngressVPC-Tgw1

  IngressVPCTgwSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IngressVPC
      CidrBlock: !Select [1, !Cidr [!Ref IngressVPCCidr, 2, 4]] # 2 subnets of /28 out of that the second one will be used
      AvailabilityZone: !Ref Az2
      Tags:
        - Key: Name
          Value: IngressVPC-Tgw2

  IngressVPCPublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IngressVPC
      CidrBlock: !Select [4, !Cidr [!Ref IngressVPCCidr, 6, 5]] # 6 subnets of /27 out of that the forth one will be used
      AvailabilityZone: !Ref Az1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: IngressVPC-Pub1

  IngressVPCPublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IngressVPC
      CidrBlock: !Select [5, !Cidr [!Ref IngressVPCCidr, 6, 5]] # 6 subnets of /27 out of that the fifth one will be used
      AvailabilityZone: !Ref Az2
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: IngressVPC-Pub2

  IngressVPCTgwRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref IngressVPC
      Tags:
        - Key: Name
          Value: IngressVPC-TgwRT

  IngressVPCPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref IngressVPC
      Tags:
        - Key: Name
          Value: IngressVPC-PubRT

  IngressVPCPubRtRoute1:
    Type: AWS::EC2::Route
    DependsOn: IngressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref IngressVPCPublicRouteTable
      DestinationCidrBlock: !Ref EgressVPCCidr
      GatewayId: !Ref TransitGateway
 
  IngressVPCPubRtRoute2:
    Type: AWS::EC2::Route
    DependsOn: IngressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref IngressVPCPublicRouteTable
      DestinationCidrBlock: !Ref VPC1Cidr
      GatewayId: !Ref TransitGateway

  IngressVPCPubRtRoute3:
    Type: AWS::EC2::Route
    DependsOn: IngressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref IngressVPCPublicRouteTable
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  IngressVPCPubRTDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IngressVPCIGWAttachment
    Properties:
      RouteTableId: !Ref IngressVPCPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IngressVPCIGW

  IngressVPCTgw1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IngressVPCTgwSubnet1
      RouteTableId: !Ref IngressVPCTgwRouteTable

  IngressVPCTgw2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IngressVPCTgwSubnet2
      RouteTableId: !Ref IngressVPCTgwRouteTable

  IngressVPCPub1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IngressVPCPublicSubnet1
      RouteTableId: !Ref IngressVPCPublicRouteTable

  IngressVPCPub2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IngressVPCPublicSubnet2
      RouteTableId: !Ref IngressVPCPublicRouteTable

  IngressVPCTGWAttachment:
    Type: AWS::EC2::TransitGatewayVpcAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref IngressVPC
      SubnetIds:
        - !Ref IngressVPCTgwSubnet1
        - !Ref IngressVPCTgwSubnet2
      Tags:
        - Key: Name
          Value: IngressVPCAttachment

  IngressVPCTGWRouteAssociation:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref IngressVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref IngressVPCTgwRT

  IngressVPCTGWRouteTableStaticRoute1:
    Type: AWS::EC2::TransitGatewayRoute
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      TransitGatewayAttachmentId: !Ref InspectionVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref IngressVPCTgwRT

  IngressVPCAlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref IngressVPC
      TargetType: ip
      Protocol: HTTP
      Port: 80
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      Matcher:
        HttpCode: 200
      Name: IngressVPC-ALB-TG
      Tags:
        - Key: Name
          Value: IngressVPC-ALB-TG

  IngressVPCALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: IngressVPCALB
      Subnets:
        - !Ref IngressVPCPublicSubnet1
        - !Ref IngressVPCPublicSubnet2
      SecurityGroups:
        - !Ref IngressVPCAlbSecurityGroup
      Scheme: internet-facing
      Type: application

  IngressVPCAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from Internet
      VpcId: !Ref IngressVPC
      GroupName: IngressVPC-ALB-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: IngressVPC-ALB-SG

  IngressVPCAlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref IngressVPCALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref IngressVPCAlbTargetGroup

  IngressVPCAlbRegisterTargetsFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IngressVPCAlbRegisterTargetsFunctionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - elasticloadbalancing:RegisterTargets
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
      RoleName: IngressVPCAlbRegisterTargetsFunctionRole

  IngressVPCAlbRegisterTargetsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: IngressVPCAlbRegisterTargetsFunction
      Tags:
        - Key: Name
          Value: IngressVPCAlbRegisterTargetsFunction
      Handler: index.handler
      Role: !GetAtt IngressVPCAlbRegisterTargetsFunctionRole.Arn
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
            ec2 = boto3.client('ec2')
            elbv2 = boto3.client('elbv2')

            try:
                print("Received event:", event)

                if event['RequestType'] == 'Delete':
                    print("Delete request received. Nothing to clean up.")
                    cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                     {"Message": "Delete request handled successfully"}, "RegisterTargets")
                    return

                response = ec2.describe_instances(Filters=[
                    {'Name': 'tag:AddToALB', 'Values': ['true']},
                    {'Name': 'instance-state-name', 'Values': ['running']}
                ])

                print("describe_instances response:", response)

                private_ips = []
                for reservation in response['Reservations']:
                    for instance in reservation['Instances']:
                        ip = instance.get('PrivateIpAddress')
                        if ip:
                            private_ips.append(ip)

                if not private_ips:
                    raise Exception("No valid private IPs found for tagged instances")

                targets = [{'Id': ip, 'Port': 80, 'AvailabilityZone': 'all'} for ip in private_ips]
                print("Registering targets:", targets)

                elbv2.register_targets(
                    TargetGroupArn=event['ResourceProperties']['TargetGroupArn'],
                    Targets=targets
                )

                cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                 {"Message": "Successfully registered targets"}, "RegisterTargets")
            except Exception as e:
                print(f"Error: {str(e)}")
                cfnresponse.send(event, context, cfnresponse.FAILED,
                                 {"Message": str(e)}, "RegisterTargets")


  IngressVPCAlbRegisterTargetsCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - VPC1EC2InstanceWeb1
      - VPC1EC2InstanceWeb2
    Properties:
      ServiceToken: !GetAtt IngressVPCAlbRegisterTargetsFunction.Arn
      TargetGroupArn: !GetAtt IngressVPCAlbTargetGroup.TargetGroupArn
########## IngressVPC Resources End here  #########################################
