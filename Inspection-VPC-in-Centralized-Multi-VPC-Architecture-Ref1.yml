          Value: EgressVPC-TgwRT1

  EgressVPCTgwRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EgressVPC
      Tags:
        - Key: Name
          Value: EgressVPC-TgwRT2

  EgressVPCPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EgressVPC
      Tags:
        - Key: Name
          Value: EgressVPC-PubRT

  EgressVPCTgwRt1Route1:
    Type: AWS::EC2::Route
    DependsOn: EgressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCTgwRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref EgressVPCNATGateway1

  EgressVPCTgwRt2Route1:
    Type: AWS::EC2::Route
    DependsOn: EgressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCTgwRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref EgressVPCNATGateway2

  EgressVPCPubRtRoute1:
    Type: AWS::EC2::Route
    DependsOn: EgressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCPublicRouteTable
      DestinationCidrBlock: !Ref IngressVPCCidr
      GatewayId: !Ref TransitGateway

  EgressVPCPubRtRoute2:
    Type: AWS::EC2::Route
    DependsOn: EgressVPCTGWAttachment
    Properties:
      RouteTableId: !Ref EgressVPCPublicRouteTable
      DestinationCidrBlock: !Ref VPC1Cidr
