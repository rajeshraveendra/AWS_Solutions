      RouteTableId: !Ref InspectionVPCTgwRouteTable2

  InspectionVPCFw1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref InspectionVPCFirewallSubnet1
      RouteTableId: !Ref InspectionVPCFirewallRouteTable

  InspectionVPCFw2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref InspectionVPCFirewallSubnet2
      RouteTableId: !Ref InspectionVPCFirewallRouteTable

  InspectionVPCTGWAttachment:
    Type: AWS::EC2::TransitGatewayVpcAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref InspectionVPC
      SubnetIds:
        - !Ref InspectionVPCTgwSubnet1
        - !Ref InspectionVPCTgwSubnet2
      Tags:
        - Key: Name
          Value: InspectionVPCAttachment

  InspectionVPCTGWRouteAssociation:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref InspectionVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref InspectionVPCTgwRT

  InspectionVPCTGWRoutePropagation1:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref IngressVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref InspectionVPCTgwRT

  InspectionVPCTGWRoutePropagation2:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref EgressVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref InspectionVPCTgwRT

  InspectionVPCTGWRoutePropagation3:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref VPC1TGWAttachment
      TransitGatewayRouteTableId: !Ref InspectionVPCTgwRT

  InspectionVPCTGWRoutePropagation4:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref VPC2TGWAttachment
      TransitGatewayRouteTableId: !Ref InspectionVPCTgwRT
      
  InspectionVPCTGWRouteStatic1:
