      TransitGatewayAttachmentId: !Ref InspectionVPCTGWAttachment
      TransitGatewayRouteTableId: !Ref EgressVPCTgwRT

  EgressVPCNATGatewayEIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EgressVPCNatGw1EIP

  EgressVPCNATGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt   EgressVPCNATGatewayEIP1.AllocationId
      SubnetId: !Ref EgressVPCPublicSubnet1
      Tags:
        - Key: Name
          Value: EgressVPCNatGw1
  
  EgressVPCNATGatewayEIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EgressVPCNatGw2EIP

  EgressVPCNATGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt   EgressVPCNATGatewayEIP2.AllocationId
      SubnetId: !Ref EgressVPCPublicSubnet2
      Tags:
        - Key: Name
          Value: EgressVPCNatGw2
         
