#
#
########## TGW Resources ###################################################

  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Description: TGW connecting all VPCs
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - Key: Name
          Value: TransitGateway

########## TGW Resources End here ##########################################
#
#
#
#
########## Flow logs  ##################################################

  FlowLogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: VPC-TGW-FlowLogPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: "*"
  TGWFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "TGW-Flowlog"
      RetentionInDays: 30

  VPC1FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC1-Flowlog"
      RetentionInDays: 30

  VPC2FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC2-Flowlog"
      RetentionInDays: 30

  VPC3FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC3-Flowlog"
      RetentionInDays: 30

  VPC4FlowLogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "VPC4-Flowlog"
      RetentionInDays: 30

  TGWFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceType: TransitGateway
      ResourceId: !Ref TransitGateway
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref TGWFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt  FlowLogIAMRole.Arn
      Tags:
        - Key: Name
          Value: TGW-Flowlog

  VPC1FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC1FlowLogLogGroup
      ResourceId: !Ref VPC1
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: VPC1-Flowlog

  VPC2FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC2FlowLogLogGroup
      ResourceId: !Ref VPC2
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: VPC2-Flowlog

  VPC3FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC3FlowLogLogGroup
      ResourceId: !Ref VPC3
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: VPC3-Flowlog

  VPC4FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogIAMRole.Arn
      LogGroupName: !Ref VPC1FlowLogLogGroup
      ResourceId: !Ref VPC4
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
