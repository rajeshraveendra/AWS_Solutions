AWSTemplateFormatVersion: '2010-09-09'
Description: >
  [Creates VPCs with subnets and connects them using a Transit Gateway.]
  [Documentation: Refer the output section for documentation.]
  [Author: Rajesh Raveendran]
  [Version: 1.0.0]
  [Date: 31-07-2025]

Parameters:
  VPC1Cidr:
    Type: String
    Description: CIDR block for VPC 1
    Default: 10.10.0.0/24
  VPC2Cidr:
    Type: String
    Description: CIDR block for VPC 2
    Default: 10.20.0.0/24
  VPC3Cidr:
    Type: String
    Description: CIDR block for VPC 3
    Default: 10.30.0.0/24
  VPC4Cidr:
    Type: String
    Description: CIDR block for VPC 4
    Default: 10.40.0.0/24
  Az1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone
  Az2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone
  InstanceImageId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for EC2 instance
    Default: ami-093dc6859d9315726

Resources:
########## VPC1 Resources ###################################################

  VPC1:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPC1Cidr
      Tags:
        - Key: Name
          Value: VPC1
  VPC1IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: VPC1-IGW
  VPC1IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC1
      InternetGatewayId: !Ref VPC1IGW

  VPC1TgwSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [0, !Cidr [!Ref VPC1Cidr, 2, 4]] # 2 subnets of /28 out of that the first one will be used
      AvailabilityZone: !Ref Az1
      Tags:
        - Key: Name
          Value: VPC1-Tgw1

  VPC1TgwSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [1, !Cidr [!Ref VPC1Cidr, 2, 4]] # 2 subnets of /28 out of that the second one will be used
      AvailabilityZone: !Ref Az2
      Tags:
        - Key: Name
          Value: VPC1-Tgw2

  VPC1PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [2, !Cidr [!Ref VPC1Cidr, 6, 5]] # 6 subnets of /27 out of that the second one will be used
      AvailabilityZone: !Ref Az1
      Tags:
        - Key: Name
          Value: VPC1-Priv1

  VPC1PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [3, !Cidr [!Ref VPC1Cidr, 6, 5]] # 6 subnets of /27 out of that the third one will be used
      AvailabilityZone: !Ref Az2
      Tags:
        - Key: Name
          Value: VPC1-Priv2

  VPC1PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [4, !Cidr [!Ref VPC1Cidr, 6, 5]] # 6 subnets of /27 out of that the forth one will be used
      AvailabilityZone: !Ref Az1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: VPC1-Pub1

  VPC1PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Select [5, !Cidr [!Ref VPC1Cidr, 6, 5]] # 6 subnets of /27 out of that the fifth one will be used
      AvailabilityZone: !Ref Az2
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: VPC1-Pub2

  VPC1TgwRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-TgwRT1

  VPC1TgwRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-TgwRT2

  VPC1PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-PrivRT1

  VPC1PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-PrivRT2

  VPC1PublicRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-PubRT1

  VPC1PublicRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC1
      Tags:
        - Key: Name
          Value: VPC1-PubRT2

  VPC1TgwRt1Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable1
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  VPC1TgwRt2Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable2
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  VPC1TgwRt1Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable1
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1TgwRt2Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable2
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1TgwRt1Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable1
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1TgwRt2Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1TgwRouteTable2
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1PrivRt1Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable1
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway
 
  VPC1PrivRt2Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable2
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  VPC1PrivRt1Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable1
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1PrivRt2Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable2
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1PrivRt1Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable1
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1PrivRt2Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PrivateRouteTable2
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRt1Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable1
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway
 
  VPC1PubRt2Route1:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable2
      DestinationCidrBlock: !Ref VPC2Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRt1Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable1
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRt2Route2:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable2
      DestinationCidrBlock: !Ref VPC3Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRt1Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable1
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRt2Route3:
    Type: AWS::EC2::Route
    DependsOn: VPC1TGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable2
      DestinationCidrBlock: !Ref VPC4Cidr
      GatewayId: !Ref TransitGateway

  VPC1PubRT1DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPC1IGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref VPC1IGW

  VPC1PubRT2DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPC1IGWAttachment
    Properties:
      RouteTableId: !Ref VPC1PublicRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref VPC1IGW

  VPC1Tgw1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1TgwSubnet1
      RouteTableId: !Ref VPC1TgwRouteTable1

  VPC1Tgw2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1TgwSubnet2
      RouteTableId: !Ref VPC1TgwRouteTable2

  VPC1Priv1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1PrivateSubnet1
      RouteTableId: !Ref VPC1PrivateRouteTable1

  VPC1Priv2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1PrivateSubnet2
      RouteTableId: !Ref VPC1PrivateRouteTable2

  VPC1Pub1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1PublicSubnet1
      RouteTableId: !Ref VPC1PublicRouteTable1

  VPC1Pub2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VPC1PublicSubnet2
      RouteTableId: !Ref VPC1PublicRouteTable2

  VPC1TGWAttachment:
    Type: AWS::EC2::TransitGatewayVpcAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref VPC1
      SubnetIds:
        - !Ref VPC1TgwSubnet1
        - !Ref VPC1TgwSubnet2
      Tags:
        - Key: Name
          Value: VPC1Attachment

########## VPC1 Resources End here  #########################################
