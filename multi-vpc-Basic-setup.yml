  VPC3IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: VPC3-IGW
  VPC3IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC3
      InternetGatewayId: !Ref VPC3IGW

  VPC3TgwSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC3
      CidrBlock: !Select [0, !Cidr [!Ref VPC3Cidr, 2, 4]] # 2 subnets of /28 out of that the first one will be used
