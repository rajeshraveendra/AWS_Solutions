  VPC3TgwSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC3
      CidrBlock: !Select [1, !Cidr [!Ref VPC3Cidr, 2, 4]] # 2 subnets of /28 out of that the second one will be used
      AvailabilityZone: !Ref Az2
      Tags:
        - Key: Name
          Value: VPC3-Tgw2

  VPC3PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
